<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mellojoy リンク生成🔗</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Yu Gothic UI", sans-serif; max-width: 900px; margin: 0 auto; padding: 0.75rem; color: #1a1a1a; -webkit-tap-highlight-color: transparent; }
  h1 { font-size: 16px; font-weight: 500; margin: 0 0 0.5rem; display: flex; align-items: center; gap: 8px; }
  h1 .count { font-size: 12px; color: #666; font-weight: 400; margin-left: auto; }
  h1 .time-display {
    font-family: ui-monospace, SFMono-Regular, monospace;
    font-size: 18px;
    font-weight: 600;
    color: #1a1a1a;
    letter-spacing: 0.5px;
    padding: 2px 8px;
    background: #f5f5f5;
    border-radius: 5px;
    border: 0.5px solid rgba(0,0,0,0.1);
  }
  button { font-family: inherit; }
  input { font-family: inherit; }

  .toolbar { display: flex; align-items: center; gap: 6px; margin-bottom: 0.5rem; flex-wrap: wrap; }
  .toolbar button { font-size: 12px; padding: 6px 10px; cursor: pointer; background: #fff; border: 0.5px solid rgba(0,0,0,0.15); border-radius: 6px; min-height: 32px; }
  .toolbar button:hover { background: #f5f5f5; }
  .toolbar button.primary { background: #1d6fdc; color: #fff; border-color: #1d6fdc; font-weight: 500; }
  .toolbar button.primary:hover { background: #1660c4; }
  .status { font-size: 11px; margin-left: auto; }
  .status.loading { color: #666; }
  .status.success { color: #1d9e75; }
  .status.error { color: #c00; }

  /* モード切替 */
  .mode-toggle { display: flex; gap: 0; border: 0.5px solid rgba(0,0,0,0.2); border-radius: 6px; overflow: hidden; }
  .mode-btn {
    font-size: 12px; padding: 6px 14px; cursor: pointer;
    background: #fff; border: none; min-height: 32px;
    color: #666;
  }
  .mode-btn + .mode-btn { border-left: 0.5px solid rgba(0,0,0,0.2); }
  .mode-btn.active { background: #6b4fd8; color: #fff; font-weight: 600; }
  .mode-btn:not(.active):hover { background: #f5f5f5; }

  .url-bar { display: flex; gap: 6px; align-items: center; margin-bottom: 0.5rem; padding: 6px; background: #f5f5f5; border-radius: 8px; }
  #generated-url {
    flex: 1; min-width: 0;
    font-family: ui-monospace, SFMono-Regular, monospace;
    font-size: 11px; padding: 8px 10px;
    background: #fff; border-radius: 6px;
    border: 0.5px solid rgba(0,0,0,0.15);
    color: #888;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    height: 36px; line-height: 20px;
  }
  #generated-url.has-url { color: #1a1a1a; }
  .url-bar button { font-size: 12px; padding: 0 12px; cursor: pointer; background: #fff; border: 0.5px solid rgba(0,0,0,0.15); border-radius: 6px; height: 36px; flex-shrink: 0; white-space: nowrap; }
  .url-bar button:disabled { opacity: 0.4; cursor: not-allowed; }
  .url-bar button:not(:disabled):hover { background: #f0f0f0; }
  .url-bar button.go-btn { background: #d92d20; color: #fff; border-color: #d92d20; font-weight: 500; }
  .url-bar button.go-btn:not(:disabled):hover { background: #ba241a; }
  .url-bar button.newtab-btn { background: #1d9e75; color: #fff; border-color: #1d9e75; font-weight: 500; }
  .url-bar button.newtab-btn:not(:disabled):hover { background: #168562; }

  .options-row { display: flex; gap: 12px; margin-bottom: 0.5rem; font-size: 11px; color: #666; flex-wrap: wrap; align-items: center; }
  .options-row label { cursor: pointer; user-select: none; display: flex; align-items: center; gap: 4px; }
  .options-row input[type="checkbox"] { width: 14px; height: 14px; cursor: pointer; }
  .options-row input[type="number"] {
    width: 48px; height: 26px; padding: 2px 6px;
    font-size: 12px; text-align: center;
    border: 0.5px solid rgba(0,0,0,0.2); border-radius: 4px;
    background: #fff;
    -moz-appearance: textfield;
  }
  .options-row input[type="number"]::-webkit-outer-spin-button,
  .options-row input[type="number"]::-webkit-inner-spin-button {
    -webkit-appearance: none; margin: 0;
  }
  .total-amount { font-weight: 600; color: #1a1a1a; font-size: 12px; }
  #action-feedback { margin-left: auto; font-size: 11px; color: #1d9e75; min-height: 14px; }

  #product-list { max-height: calc(100vh - 230px); overflow-y: auto; border: 0.5px solid rgba(0,0,0,0.15); border-radius: 8px; -webkit-overflow-scrolling: touch; }

  .row { display: flex; align-items: center; gap: 6px; padding: 8px 6px; border-bottom: 0.5px solid rgba(0,0,0,0.08); }
  .row:last-child { border-bottom: none; }
  .row.selected { background: #eaf3fc; }

  .row .toggle { width: 20px; height: 20px; flex-shrink: 0; cursor: pointer; }

  .qty-controls { display: flex; align-items: center; gap: 0; flex-shrink: 0; border: 0.5px solid rgba(0,0,0,0.15); border-radius: 5px; overflow: hidden; background: #fff; }
  .qty-btn { width: 24px; height: 26px; background: #fff; border: none; font-size: 13px; cursor: pointer; padding: 0; line-height: 1; color: #1a1a1a; user-select: none; }
  .qty-btn:hover { background: #f0f0f0; }
  .qty-btn:active { background: #e0e0e0; }
  .qty-input { width: 26px; height: 26px; font-size: 12px; text-align: center; border: none; border-left: 0.5px solid rgba(0,0,0,0.15); border-right: 0.5px solid rgba(0,0,0,0.15); -moz-appearance: textfield; padding: 0; background: #fff; }
  .qty-input::-webkit-outer-spin-button, .qty-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

  .badge { font-size: 10px; padding: 1px 5px; border-radius: 3px; flex-shrink: 0; font-weight: 500; }
  .badge-soldout { background: #fcebeb; color: #791f1f; margin-left: 4px; }
  .badge-code { background: #f0f0f0; color: #555; font-family: ui-monospace, monospace; }

  .row .thumb {
    width: 44px; height: 44px;
    object-fit: cover;
    border-radius: 5px;
    flex-shrink: 0;
    background: #f0f0f0;
    border: 0.5px solid rgba(0,0,0,0.08);
  }

  .row .name { flex: 1; font-size: 14px; line-height: 1.35; min-width: 0; }
  .row .name .title { font-weight: 500; word-break: break-word; }
  .row .name .variant-label { font-size: 12px; color: #555; margin-top: 1px; }
  .row .name .meta { font-size: 10px; color: #999; margin-top: 1px; font-family: ui-monospace, monospace; }
  .row .price { font-size: 12px; color: #333; flex-shrink: 0; font-family: ui-monospace, monospace; white-space: nowrap; }

  .empty-msg { padding: 2rem; text-align: center; color: #888; font-size: 13px; }

  /* スマホ */
  @media (max-width: 600px) {
    body { padding: 0.5rem; }
    h1 { font-size: 14px; }
    h1 .count { font-size: 11px; }
    h1 .time-display { font-size: 16px; padding: 2px 6px; }
    .toolbar button { font-size: 11px; padding: 6px 8px; min-height: 30px; }
    .mode-btn { font-size: 11px; padding: 6px 10px; min-height: 30px; }
    .status { font-size: 10px; }
    #generated-url { font-size: 10px; padding: 6px 8px; height: 32px; line-height: 18px; }
    .url-bar button { font-size: 11px; padding: 0 8px; height: 32px; }
    .options-row { font-size: 11px; gap: 10px; }
    .options-row input[type="number"] { width: 44px; height: 28px; font-size: 13px; }
    .row { gap: 5px; padding: 8px 4px; }
    .row .toggle { width: 22px; height: 22px; }
    .row .thumb { width: 40px; height: 40px; }
    .row .name { font-size: 14px; }
    .row .name .variant-label { font-size: 12px; }
    .row .name .meta { font-size: 10px; }
    .row .price { font-size: 11px; }
    .qty-btn { width: 26px; height: 28px; font-size: 14px; }
    .qty-input { width: 26px; height: 28px; font-size: 12px; }
    .badge { font-size: 10px; padding: 1px 4px; }
    #product-list { max-height: calc(100vh - 250px); }
  }
</style>
</head>
<body>

<h1>Mellojoy🔗 <span class="time-display" id="time-display">--:--:--</span> <span class="count" id="selected-count">0 商品</span></h1>

<div class="toolbar">
  <button id="reload-btn" class="primary">再読込</button>
  <button id="clear-btn">選択クリア</button>
  <button id="select-all-btn" title="全商品をチェック（売切含む）">全選択</button>
  <div class="mode-toggle">
    <button class="mode-btn" data-mode="cartin" id="mode-cartin">カートイン</button>
    <button class="mode-btn" data-mode="checkout" id="mode-checkout">チェックアウト</button>
  </div>
  <span id="status" class="status loading">読み込み中...</span>
</div>

<div class="url-bar">
  <div id="generated-url">商品を選択するとURLが生成されます</div>
  <button id="copy-btn" disabled>コピー</button>
  <button id="open-newtab-btn" class="newtab-btn" disabled>新タブ</button>
  <button id="open-btn" class="go-btn" disabled>開く</button>
</div>

<div class="options-row">
  <label>初期数量: <input type="number" id="default-qty" min="1" max="99" value="1" /></label>
  <label><input type="checkbox" id="show-images" checked> 画像を表示</label>
  <label><input type="checkbox" id="hide-soldout"> 売切を非表示</label>
  <label><input type="checkbox" id="show-fullname"> 商品名を全表示</label>
  <span class="total-amount" id="total-amount"></span>
  <span id="action-feedback"></span>
</div>

<div id="product-list">
  <div class="empty-msg">商品データを取得しています...</div>
</div>

<script>
(function() {
  const BASE = 'https://www.mellojoyjapan.com';
  // 2026-07時点: ブラインド/単品は「mellojoy-单品」コレクションに統合済み（154商品）
  // 旧「mellojoy」ハンドルは空になっている
  const COLLECTION_HANDLE = 'mellojoy-\u5355\u54C1';
  const DEFAULT_QTY_KEY = 'mellojoy_link_default_qty_v3';
  const MODE_KEY = 'mellojoy_link_mode_v3';
  const SELECTED_CODES_KEY = 'mellojoy_link_selected_codes_v3';
  const SHOW_IMAGES_KEY = 'mellojoy_link_show_images_v3';
  const CARTIN_QUERY = 'attributes%5Bfrom%5D=new-customer-accounts&storefront=true&country=JP';
  const PRODUCT_CODE_REGEX = /【([A-Z]\d+(?:-\d+)?)】/;

  const NOISE_KEYWORDS = [
    'キャンセル', 'ブラインドボックス', 'ブラインドぼっくす',
    '盲盒', 'おもちゃ', 'おもちや'
  ];

  function cleanProductName(name) {
    if (!name) return '';
    let s = name;
    s = s.replace(/【【[^】]*】】/g, '');
    const pattern = new RegExp(
      '【[^【】]*(?:' + NOISE_KEYWORDS.join('|') + ')[^【】]*】',
      'g'
    );
    s = s.replace(pattern, '');
    s = s.replace(/[\s　]+/g, ' ').trim();
    return s;
  }

  function extractCode(text) {
    if (!text) return null;
    const m = text.match(PRODUCT_CODE_REGEX);
    return m ? m[1] : null;
  }

  let products = [];
  let selected = new Map();  // variantId -> {qty}
  let defaultQty = 1;
  let urlMode = 'cartin';    // 'cartin' | 'checkout'
  let savedCodes = {};       // variantCode -> qty（再読込・翌日への引き継ぎ用）

  function loadConfig() {
    try {
      const q = parseInt(localStorage.getItem(DEFAULT_QTY_KEY));
      defaultQty = (q >= 1 && q <= 99) ? q : 1;
    } catch (e) { defaultQty = 1; }
    try {
      const m = localStorage.getItem(MODE_KEY);
      urlMode = (m === 'checkout') ? 'checkout' : 'cartin';
    } catch (e) { urlMode = 'cartin'; }
    try {
      const raw = localStorage.getItem(SELECTED_CODES_KEY);
      const parsed = raw ? JSON.parse(raw) : {};
      savedCodes = (typeof parsed === 'object' && parsed !== null) ? parsed : {};
    } catch (e) { savedCodes = {}; }
  }

  function saveConfig() {
    try {
      localStorage.setItem(DEFAULT_QTY_KEY, String(defaultQty));
      localStorage.setItem(MODE_KEY, urlMode);
    } catch (e) {}
  }

  function saveSelectedCodes() {
    try {
      localStorage.setItem(SELECTED_CODES_KEY, JSON.stringify(savedCodes));
    } catch (e) {}
  }

  // 現在の選択状態から savedCodes を再構築して保存
  // コードを持つvariantのみ引き継ぎ対象（コード無しは当日限り）
  function syncSelectedCodes() {
    const codeByVid = new Map();
    for (const r of flattenVariants()) {
      if (r.variantCode) codeByVid.set(r.variantId, r.variantCode.toUpperCase());
    }
    savedCodes = {};
    for (const [vid, s] of selected.entries()) {
      const code = codeByVid.get(vid);
      if (code) savedCodes[code] = s.qty;
    }
    saveSelectedCodes();
  }

  // savedCodes を現在のカタログに適用（variantId が日次で変わっても
  // コード経由で選択を復元する）。戻り値: 復元件数
  function applySavedCodes() {
    const codes = Object.keys(savedCodes);
    if (codes.length === 0) return 0;
    let applied = 0;
    for (const r of flattenVariants()) {
      if (!r.variantCode) continue;
      const code = r.variantCode.toUpperCase();
      if (code in savedCodes && !selected.has(r.variantId)) {
        let q = parseInt(savedCodes[code]);
        if (isNaN(q) || q < 1) q = 1;
        if (q > 99) q = 99;
        selected.set(r.variantId, { qty: q });
        applied++;
      }
    }
    return applied;
  }

  const statusEl = document.getElementById('status');
  const listEl = document.getElementById('product-list');
  const urlEl = document.getElementById('generated-url');
  const countEl = document.getElementById('selected-count');
  const copyBtn = document.getElementById('copy-btn');
  const openBtn = document.getElementById('open-btn');
  const openNewtabBtn = document.getElementById('open-newtab-btn');
  const feedbackEl = document.getElementById('action-feedback');
  const hideSoldout = document.getElementById('hide-soldout');
  const showFullname = document.getElementById('show-fullname');
  const showImages = document.getElementById('show-images');
  const defaultQtyInput = document.getElementById('default-qty');
  const totalAmountEl = document.getElementById('total-amount');
  const modeCartinBtn = document.getElementById('mode-cartin');
  const modeCheckoutBtn = document.getElementById('mode-checkout');

  async function fetchCollection(handle) {
    const encoded = encodeURI(handle);
    const target = `${BASE}/collections/${encoded}/products.json?limit=250`;
    const res = await fetch(target, { cache: 'no-store' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return await res.json();
  }

  async function loadAll() {
    statusEl.textContent = '読込中...';
    statusEl.className = 'status loading';
    products = [];
    try {
      const data = await fetchCollection(COLLECTION_HANDLE);
      for (const p of (data.products || [])) {
        products.push({
          id: p.id,
          title: p.title,
          productCode: extractCode(p.title),
          publishedAt: p.published_at,
          image: (p.images && p.images[0] && p.images[0].src) || null,
          variants: (p.variants || []).map(v => ({
            id: v.id,
            title: v.title,
            available: v.available,
            price: v.price,
            image: (v.featured_image && v.featured_image.src) || null
          }))
        });
      }
      statusEl.textContent = `${products.length} 商品`;
      statusEl.className = 'status success';
    } catch (e) {
      statusEl.textContent = `取得失敗: ${e.message}`;
      statusEl.className = 'status error';
    }
    // 再読込時: 選択をクリア→保存コード経由で新IDに引き継ぎ
    selected.clear();
    const applied = applySavedCodes();
    updateUrl();
    render();
    if (applied > 0) flashFeedback(`前回の選択 ${applied} 件を引き継ぎ`);
  }

  function flattenVariants() {
    const rows = [];
    for (const p of products) {
      const hasMultipleVariants = p.variants.length > 1;
      for (const v of p.variants) {
        rows.push({
          productId: p.id,
          productTitle: p.title,
          productCode: p.productCode,
          variantCode: extractCode(v.title) || p.productCode,
          image: v.image || p.image,
          variantId: v.id,
          variantTitle: v.title,
          available: v.available,
          price: parseFloat(v.price) || 0,
          showVariantLabel: hasMultipleVariants
        });
      }
    }
    return rows;
  }

  // 全選択: 全商品（売切含む）をチェック
  function selectEverything() {
    const allRows = flattenVariants();
    if (allRows.length === 0) {
      flashFeedback('商品データなし', true);
      return;
    }
    selected.clear();
    for (const r of allRows) {
      selected.set(r.variantId, { qty: defaultQty });
    }
    syncSelectedCodes();
    updateUrl();
    render();
    flashFeedback(`全 ${allRows.length} 件選択`);
  }

  function render() {
    let rows = flattenVariants();

    rows = rows.filter(r => {
      if (hideSoldout.checked && !r.available) return false;
      return true;
    });

    if (rows.length === 0) {
      listEl.innerHTML = '<div class="empty-msg">該当商品なし</div>';
      return;
    }

    const useFullName = showFullname.checked;
    const useImages = showImages.checked;

    listEl.innerHTML = rows.map(r => {
      const sel = selected.get(r.variantId);
      const checked = sel ? 'checked' : '';
      const rowClass = sel ? 'row selected' : 'row';
      const soldOutBadge = !r.available ? '<span class="badge badge-soldout">売切</span>' : '';
      const displayCode = r.variantCode || r.productCode;
      const codeBadge = displayCode ? ` <span class="badge badge-code">${escapeHtml(displayCode)}</span>` : '';
      const displayTitle = useFullName ? r.productTitle : cleanProductName(r.productTitle);
      const variantLabel = r.showVariantLabel
        ? `<div class="variant-label">${escapeHtml(r.variantTitle)}</div>`
        : '';
      const qty = sel ? sel.qty : defaultQty;
      const priceStr = r.price > 0 ? `¥${r.price.toLocaleString()}` : '';
      // Shopify CDNの width パラメータで縮小画像を要求（既存クエリに追記）
      const thumbSrc = r.image
        ? r.image + (r.image.includes('?') ? '&' : '?') + 'width=88'
        : '';
      const thumbHtml = (useImages && thumbSrc)
        ? `<img class="thumb" src="${escapeHtml(thumbSrc)}" loading="lazy" alt="" onerror="this.style.display='none'" />`
        : '';

      return `
        <div class="${rowClass}" data-vid="${r.variantId}">
          <input type="checkbox" class="toggle" data-vid="${r.variantId}" ${checked} />
          <div class="qty-controls">
            <button class="qty-btn qty-minus" data-vid="${r.variantId}" type="button">−</button>
            <input type="number" class="qty-input" data-vid="${r.variantId}" min="1" max="99" value="${qty}" />
            <button class="qty-btn qty-plus" data-vid="${r.variantId}" type="button">+</button>
          </div>
          ${thumbHtml}
          <div class="name">
            <div class="title">${escapeHtml(displayTitle)}${codeBadge}${soldOutBadge}</div>
            ${variantLabel}
            <div class="meta">${r.variantId}</div>
          </div>
          <span class="price">${priceStr}</span>
        </div>
      `;
    }).join('');

    bindRowEvents();
  }

  function bindRowEvents() {
    listEl.querySelectorAll('.toggle').forEach(el => {
      el.addEventListener('change', e => {
        const vid = parseInt(e.target.dataset.vid);
        if (e.target.checked) {
          const row = e.target.closest('.row');
          const qtyInput = row.querySelector('.qty-input');
          const qty = parseInt(qtyInput.value) || 1;
          selected.set(vid, { qty });
        } else {
          selected.delete(vid);
        }
        const row = e.target.closest('.row');
        row.classList.toggle('selected', e.target.checked);
        syncSelectedCodes();
        updateUrl();
      });
    });

    listEl.querySelectorAll('.qty-input').forEach(el => {
      el.addEventListener('input', e => {
        const vid = parseInt(e.target.dataset.vid);
        let v = parseInt(e.target.value);
        if (isNaN(v) || v < 1) v = 1;
        if (v > 99) v = 99;
        e.target.value = v;
        const sel = selected.get(vid);
        if (sel) {
          sel.qty = v;
          syncSelectedCodes();
          updateUrl();
        }
      });
    });

    listEl.querySelectorAll('.qty-minus').forEach(el => {
      el.addEventListener('click', e => {
        const row = e.target.closest('.row');
        const qtyInput = row.querySelector('.qty-input');
        let v = parseInt(qtyInput.value) || 1;
        v = Math.max(1, v - 1);
        qtyInput.value = v;
        qtyInput.dispatchEvent(new Event('input', { bubbles: true }));
      });
    });

    listEl.querySelectorAll('.qty-plus').forEach(el => {
      el.addEventListener('click', e => {
        const row = e.target.closest('.row');
        const qtyInput = row.querySelector('.qty-input');
        let v = parseInt(qtyInput.value) || 1;
        v = Math.min(99, v + 1);
        qtyInput.value = v;
        qtyInput.dispatchEvent(new Event('input', { bubbles: true }));
      });
    });
  }

  function buildUrl() {
    const parts = Array.from(selected.entries()).map(([vid, s]) => `${vid}:${s.qty}`);
    const path = `${BASE}/cart/${parts.join(',')}`;
    return urlMode === 'cartin' ? `${path}?${CARTIN_QUERY}` : path;
  }

  function updateTotal() {
    if (selected.size === 0) {
      totalAmountEl.textContent = '';
      return;
    }
    const priceMap = new Map();
    for (const r of flattenVariants()) priceMap.set(r.variantId, r.price);
    let total = 0;
    for (const [vid, s] of selected.entries()) {
      total += (priceMap.get(vid) || 0) * s.qty;
    }
    totalAmountEl.textContent = `合計: ¥${total.toLocaleString()}`;
  }

  function updateUrl() {
    countEl.textContent = `${selected.size} 商品`;
    updateTotal();
    if (selected.size === 0) {
      urlEl.textContent = '商品を選択するとURLが生成されます';
      urlEl.classList.remove('has-url');
      copyBtn.disabled = true;
      openBtn.disabled = true;
      openNewtabBtn.disabled = true;
      return;
    }
    urlEl.textContent = buildUrl();
    urlEl.classList.add('has-url');
    copyBtn.disabled = false;
    openBtn.disabled = false;
    openNewtabBtn.disabled = false;
  }

  function updateModeButtons() {
    modeCartinBtn.classList.toggle('active', urlMode === 'cartin');
    modeCheckoutBtn.classList.toggle('active', urlMode === 'checkout');
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function flashFeedback(msg, isError) {
    feedbackEl.textContent = msg;
    feedbackEl.style.color = isError ? '#c00' : '#1d9e75';
    setTimeout(() => { feedbackEl.textContent = ''; }, 2500);
  }

  copyBtn.addEventListener('click', async () => {
    const text = urlEl.textContent;
    if (navigator.clipboard && navigator.clipboard.writeText) {
      try {
        await navigator.clipboard.writeText(text);
        flashFeedback(`コピー済 (${text.length}文字)`);
        return;
      } catch (e) {
        console.error('Clipboard API失敗:', e);
      }
    }
    try {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.top = '0';
      ta.style.left = '-9999px';
      ta.setAttribute('readonly', '');
      document.body.appendChild(ta);
      ta.select();
      ta.setSelectionRange(0, text.length);
      const ok = document.execCommand('copy');
      document.body.removeChild(ta);
      if (ok) {
        flashFeedback(`コピー済(旧API ${text.length}文字)`);
        return;
      }
      flashFeedback('コピー失敗', true);
    } catch (e) {
      flashFeedback(`コピー失敗: ${e.message || e}`, true);
    }
  });

  openBtn.addEventListener('click', () => {
    window.location.href = buildUrl();
  });

  // 新タブで開く: anchor click方式（Referer維持・ポップアップブロッカー回避）
  openNewtabBtn.addEventListener('click', () => {
    const a = document.createElement('a');
    a.href = buildUrl();
    a.target = '_blank';
    a.style.display = 'none';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  });

  modeCartinBtn.addEventListener('click', () => {
    urlMode = 'cartin';
    saveConfig();
    updateModeButtons();
    updateUrl();
  });
  modeCheckoutBtn.addEventListener('click', () => {
    urlMode = 'checkout';
    saveConfig();
    updateModeButtons();
    updateUrl();
  });

  hideSoldout.addEventListener('change', render);
  showFullname.addEventListener('change', render);
  showImages.addEventListener('change', () => {
    try { localStorage.setItem(SHOW_IMAGES_KEY, showImages.checked ? '1' : '0'); } catch (e) {}
    render();
  });

  defaultQtyInput.addEventListener('input', e => {
    let v = parseInt(e.target.value);
    if (isNaN(v) || v < 1) v = 1;
    if (v > 99) v = 99;
    defaultQty = v;
    saveConfig();
    render();
  });

  document.getElementById('reload-btn').addEventListener('click', loadAll);
  document.getElementById('clear-btn').addEventListener('click', () => {
    selected.clear();
    savedCodes = {};
    saveSelectedCodes();
    render();
    updateUrl();
  });
  document.getElementById('select-all-btn').addEventListener('click', selectEverything);

  // 時計表示: 秒境界に同期した自己補正タイマー
  const timeDisplay = document.getElementById('time-display');
  function updateTimeDisplay() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2, '0');
    const m = String(now.getMinutes()).padStart(2, '0');
    const s = String(now.getSeconds()).padStart(2, '0');
    timeDisplay.textContent = `${h}:${m}:${s}`;
  }
  function startClock() {
    updateTimeDisplay();
    const msToNextSecond = 1000 - (Date.now() % 1000);
    setTimeout(startClock, msToNextSecond);
  }
  startClock();

  // 初期化
  loadConfig();
  defaultQtyInput.value = defaultQty;
  try {
    showImages.checked = localStorage.getItem(SHOW_IMAGES_KEY) !== '0';
  } catch (e) {}
  updateModeButtons();
  loadAll();
})();
</script>

</body>
</html>
